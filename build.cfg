# Build Configuration for Monitor-AI Assistant
# This file controls build behavior and settings

[build]
# Build output directory
dist_dir = dist

# Build working directory
build_dir = build

# Include model file in executable (warning: increases exe size significantly)
include_model = true

# Model file path (relative to project root)
model_path = models/mistral-7b-instruct.Q4_0.ggmlv3.bin

# Build type: onefile or directory
build_type = onefile

# Compression: upx (requires UPX installed)
compression = none

[pyinstaller]
# PyInstaller options
console = false
windowed = true
debug = false

# Hidden imports (comma-separated)
# These are modules that PyInstaller can't detect automatically
hidden_imports = paddleocr,llama_cpp,screeninfo,mss,cv2,PIL,tkinter

[application]
# Application metadata
name = MonitorAI
version = 1.0.0
author = Monitor-AI Team
description = Screen-aware AI assistant with local LLM

[hooks]
# PyInstaller hooks directory
hooks_dir = hooks

# Collect data files from these packages
collect_data_from = paddleocr,screeninfo

[performance]
# Performance settings
upx_enabled = false
strip_binaries = false
exclude_modules = matplotlib,pandas,scipy,torch

[distribution]
# Distribution settings
create_installer = false
installer_type = nsis
sign_executable = false
code_signing_cert = 

[testing]
# Testing before build
run_tests = false
test_command = pytest tests/
test_fail_on_error = true

[logging]
# Build logging
log_level = INFO
verbose = false
